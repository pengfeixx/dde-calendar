version: "1"

package:
  id: org.dde.calendar
  name: dde-calendar
  version: 6.5.40.1
  kind: app
  description: |
    calendar for deepin os.

base: org.deepin.base/25.2.2
runtime: org.deepin.runtime.dtk/25.2.2

command:
  - dde-calendar

build: |

  apt -y install --download-only deepin-gettext-tools libdtk6gui-dev libdtk6widget-dev qt6-base-dev qt6-tools-dev qt6-tools-dev-tools qt6-svg-dev libgtest-dev libical-dev libgcrypt20-dev
  bash ./install_dep /var/cache/apt/archives "$PREFIX"

  # 修改路径
  sed -i 's|set(QT_LRELEASE "/lib/qt${QT_VERSION_MAJOR}/bin/lrelease")|set(QT_LRELEASE "lrelease")|g' cmake/translation-generate.cmake

  VERSION=$(head -1 debian/changelog | awk -F'[()]' '{print $2}')
  cmake -B build ${conf_args} \
        -DCMAKE_SAFETYTEST_ARG="CMAKE_SAFETYTEST_ARG_OFF" \
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_INSTALL_PREFIX="${PREFIX}" \
        -DVERSION=${VERSION} \
        -DEXEC_DDE_CALENDAR="dde-calendar" \
        -DEXEC_DDE_CALENDAR_SERVICE="${PREFIX}/libexec/deepin-daemon/dde-calendar-service"
  cmake --build build -j`nproc`
  cmake --build build --target install > install.log 2>&1

  # 项目生成应用名和动态隐式加载的依赖库，ldd无法找到的其他库
  LDD_FILES=(
    dde-calendar
    ../libexec/deepin-daemon/dde-calendar-service
  )

  # 生成.install 文件
  bash ./deploy_dep "${LDD_FILES[@]}"

# allow apt download in build and do apt update
buildext:
  apt:
    build_depends:
      - libc6